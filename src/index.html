<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MEDWARE – Medical Awareness Portal</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="MEDWARE – Medical Awareness Portal. Empowering Cameroon with accurate health information on first aid, diseases, symptoms, and more.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    #google_translate_element {
      position: fixed;
      bottom: 80px;
      left: 16px;
      z-index: 9999;
    }
    .goog-te-gadget-simple {
      border: none !important;
      background: rgba(0,0,0,0.65) !important;
      border-radius: 8px !important;
      padding: 4px 8px !important;
      font-size: 13px !important;
    }
    .goog-te-gadget-simple .goog-te-menu-value span {
      color: #fff !important;
    }
    .goog-te-gadget-simple img { display: none !important; }
    body > .skiptranslate { display: none !important; }
    body { top: 0 !important; }
  </style>
</head>
<body>
  <div id="google_translate_element"></div>
  <app-root></app-root>
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        { pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE },
        'google_translate_element'
      );
    }
  </script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
  <script>
  window.gnosariConfig = {
    agentUri: 'health-info-assistant-c3qm',
    displayMode: 'bubble',
    position: 'bottom-right'
  };
  </script>
  <script src="https://app.gnosari.com/gnosari-chat-widget-advanced.js"></script>
</body>
</html>
